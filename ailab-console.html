<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AILab — Operations Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14161A;
    --panel: #1B1E24;
    --panel-raised: #21252C;
    --line: rgba(237,234,227,0.08);
    --line-strong: rgba(237,234,227,0.16);
    --ink: #EDEAE3;
    --ink-dim: #9A9890;
    --ink-faint: #66645E;
    --amber: #FF8A3D;
    --amber-dim: rgba(255,138,61,0.14);
    --signal: #5B8DEF;
    --signal-dim: rgba(91,141,239,0.14);
    --good: #7FD99A;
    --warn: #FFC65C;
    --bad: #FF6B5E;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 13px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .mono { font-family: var(--mono); }

  /* ============ LOGIN ============ */
  .login-wrap { min-height: 100vh; display: none; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }
  .login-wrap.show { display: flex; }
  .login-wrap::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    mask-image: radial-gradient(circle at 50% 40%, black 0%, transparent 70%);
  }
  .login-card { position: relative; width: 400px; z-index: 1; }
  .login-mark { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 28px; text-align: center; }
  .login-mark span { color: var(--amber); }
  .login-title { font-family: var(--mono); font-size: 32px; font-weight: 600; text-align: center; letter-spacing: -0.02em; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--ink-dim); text-align: center; margin-bottom: 36px; }
  .login-panel { background: var(--panel); border: 1px solid var(--line-strong); border-radius: 4px; padding: 28px; }
  .field { margin-bottom: 16px; }
  .field-label { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; display: block; }
  .field input, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--line-strong);
    border-radius: 3px; padding: 10px 12px; color: var(--ink); font-size: 13px;
    font-family: var(--mono); outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--amber); }
  .btn-go {
    width: 100%; background: var(--amber); color: #1A1106; border: none;
    border-radius: 3px; padding: 12px; font-size: 13px; font-weight: 600;
    font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em;
    cursor: pointer; transition: opacity 0.15s; margin-top: 4px;
  }
  .btn-go:hover { opacity: 0.85; }
  .login-divider { display: flex; align-items: center; gap: 10px; margin: 22px 0 14px; }
  .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .login-divider span { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.12em; }
  .demo-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 12px; border: 1px solid var(--line); border-radius: 3px;
    cursor: pointer; margin-bottom: 6px; transition: border-color 0.15s;
  }
  .demo-row:hover { border-color: var(--line-strong); }
  .demo-role { font-family: var(--mono); font-size: 11px; color: var(--ink); }
  .demo-key { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); border: 1px solid var(--line-strong); border-radius: 3px; padding: 2px 6px; }

  /* ============ SHELL ============ */
  .shell { display: none; min-height: 100vh; }
  .shell.show { display: flex; }

  .rail {
    width: 232px; background: var(--panel); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .rail-head { padding: 18px 18px 16px; border-bottom: 1px solid var(--line); }
  .rail-id { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
  .rail-id span { color: var(--amber); }
  .rail-name { font-family: var(--mono); font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }

  .rail-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
  .nav-group-label { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.14em; padding: 14px 18px 6px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 8px 18px;
    cursor: pointer; color: var(--ink-dim); font-size: 13px;
    border-left: 2px solid transparent; position: relative; transition: all 0.12s;
  }
  .nav-item:hover { color: var(--ink); background: rgba(255,255,255,0.02); }
  .nav-item.active { color: var(--ink); border-left-color: var(--amber); background: var(--amber-dim); }
  .nav-item .glyph { font-family: var(--mono); font-size: 11px; width: 16px; text-align: center; opacity: 0.6; flex-shrink: 0; }
  .nav-item.active .glyph { opacity: 1; color: var(--amber); }
  .nav-item .nkey { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--ink-faint); opacity: 0; }
  .nav-item:hover .nkey { opacity: 1; }

  .rail-foot { padding: 14px 18px; border-top: 1px solid var(--line); }
  .who-row { display: flex; align-items: center; gap: 10px; }
  .who-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--good); flex-shrink: 0; box-shadow: 0 0 0 3px rgba(127,217,154,0.15); }
  .who-info { flex: 1; min-width: 0; }
  .who-email { font-family: var(--mono); font-size: 11px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .who-role { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; }
  .signout { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); background: none; border: 1px solid var(--line-strong); border-radius: 3px; padding: 4px 8px; cursor: pointer; transition: color 0.15s; }
  .signout:hover { color: var(--bad); border-color: var(--bad); }

  /* MAIN */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .pulsebar {
    height: 44px; border-bottom: 1px solid var(--line); display: flex;
    align-items: center; padding: 0 22px; gap: 18px; background: var(--panel);
    flex-shrink: 0;
  }
  .pulse-title { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
  .pulse-wave { flex: 1; height: 24px; overflow: hidden; position: relative; }
  .pulse-wave svg { display: block; }
  .pulse-readout { display: flex; gap: 16px; align-items: center; }
  .readout { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); white-space: nowrap; }
  .readout b { color: var(--ink); font-weight: 500; }
  .readout.live b { color: var(--good); }
  .clock-readout { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); border: 1px solid var(--line); border-radius: 3px; padding: 4px 9px; white-space: nowrap; }

  .content { flex: 1; padding: 26px 28px; overflow-y: auto; }

  .page-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
  .page-eyebrow { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 6px; }
  .page-title { font-family: var(--mono); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .page-meta { font-size: 12px; color: var(--ink-dim); }

  /* STAT GRID */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1px; margin-bottom: 24px; background: var(--line); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
  .stat-cell { background: var(--panel); padding: 16px 18px; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .stat-value { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1; }
  .stat-value.amber { color: var(--amber); }
  .stat-value.signal { color: var(--signal); }
  .stat-value.good { color: var(--good); }
  .stat-value.bad { color: var(--bad); }
  .stat-foot { font-size: 11px; color: var(--ink-faint); margin-top: 8px; }
  .stat-foot.up { color: var(--good); }
  .stat-foot.down { color: var(--bad); }

  /* PANEL */
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--line); }
  .panel-title { font-family: var(--mono); font-size: 12px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
  .panel-title .dim { color: var(--ink-faint); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px; }
  .panel-action { font-family: var(--mono); font-size: 11px; color: var(--signal); cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; }
  .panel-action:hover { text-decoration: underline; }
  .panel-body { padding: 16px 18px; }

  /* TABLE */
  table.console-table { width: 100%; border-collapse: collapse; }
  table.console-table th {
    text-align: left; font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 18px; border-bottom: 1px solid var(--line);
    font-weight: 500;
  }
  table.console-table td { padding: 11px 18px; font-size: 12px; border-bottom: 1px solid var(--line); }
  table.console-table tbody tr:last-child td { border-bottom: none; }
  table.console-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
  .cell-mono { font-family: var(--mono); font-size: 11px; }
  .cell-amber { color: var(--amber); }
  .cell-signal { color: var(--signal); }

  /* TAG */
  .tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid; }
  .tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .tag-run { color: var(--good); border-color: rgba(127,217,154,0.3); background: rgba(127,217,154,0.08); }
  .tag-pend { color: var(--warn); border-color: rgba(255,198,92,0.3); background: rgba(255,198,92,0.08); }
  .tag-stop { color: var(--bad); border-color: rgba(255,107,94,0.3); background: rgba(255,107,94,0.08); }
  .tag-done { color: var(--signal); border-color: rgba(91,141,239,0.3); background: rgba(91,141,239,0.08); }

  /* BAR */
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); width: 90px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.06em; }
  .bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 0; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; transition: width 0.6s ease; }
  .bar-val { font-family: var(--mono); font-size: 12px; color: var(--ink); width: 42px; text-align: right; flex-shrink: 0; }

  /* LOG */
  .logline { font-family: var(--mono); font-size: 11px; padding: 7px 0; border-bottom: 1px solid var(--line); display: flex; gap: 14px; align-items: baseline; }
  .logline:last-child { border-bottom: none; }
  .logtime { color: var(--ink-faint); flex-shrink: 0; min-width: 64px; }
  .loglvl { flex-shrink: 0; min-width: 44px; font-weight: 600; }
  .loglvl-INFO { color: var(--good); }
  .loglvl-WARN { color: var(--warn); }
  .loglvl-ERR { color: var(--bad); }
  .logmsg { color: var(--ink-dim); }
  .logmsg .hl { color: var(--ink); }

  /* GRID 2 COL */
  .g2 { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; }
  .g2-rev { display: grid; grid-template-columns: 1fr 1.3fr; gap: 20px; }

  /* CODE BLOCK */
  .codeblock { font-family: var(--mono); font-size: 11px; line-height: 1.8; color: var(--ink-dim); background: var(--bg); border: 1px solid var(--line); border-radius: 3px; padding: 14px 16px; overflow-x: auto; white-space: pre; }
  .codeblock .kw { color: var(--signal); }
  .codeblock .str { color: var(--good); }
  .codeblock .cm { color: var(--ink-faint); }

  /* FORM CONTROLS */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .btn-console {
    font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 8px 16px; border-radius: 3px; cursor: pointer; transition: opacity 0.15s; border: 1px solid;
  }
  .btn-console:hover { opacity: 0.85; }
  .btn-amber { background: var(--amber); color: #1A1106; border-color: var(--amber); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-strong); }

  .notice { display: flex; gap: 12px; padding: 12px 16px; border-radius: 3px; margin-bottom: 12px; font-size: 12px; align-items: flex-start; border: 1px solid; line-height: 1.6; }
  .notice-ok { color: var(--good); border-color: rgba(127,217,154,0.25); background: rgba(127,217,154,0.06); }
  .notice-warn { color: var(--warn); border-color: rgba(255,198,92,0.25); background: rgba(255,198,92,0.06); }
  .notice-bad { color: var(--bad); border-color: rgba(255,107,94,0.25); background: rgba(255,107,94,0.06); }
  .notice b { font-family: var(--mono); }

  /* SCHEMA DIAGRAM */
  .schema-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .schema-table { border: 1px solid var(--line-strong); border-radius: 3px; overflow: hidden; }
  .schema-name { font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 8px 12px; background: var(--panel-raised); border-bottom: 1px solid var(--line); color: var(--amber); }
  .schema-field { font-family: var(--mono); font-size: 11px; padding: 6px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; color: var(--ink-dim); }
  .schema-field:last-child { border-bottom: none; }
  .schema-field .pk { color: var(--signal); }
  .schema-field .ftype { color: var(--ink-faint); }

  @media(max-width: 980px) {
    .g2, .g2-rev, .schema-grid { grid-template-columns: 1fr; }
    .rail { width: 0; overflow: hidden; }
  }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-wrap show" id="login-wrap">
  <div class="login-card">
    <div class="login-mark">AILab <span>/</span> ML Operations Cloud <span>/</span> ap-south-1</div>
    <div class="login-title">console.ailab</div>
    <div class="login-sub">Authenticate to access the operations console</div>
    <div class="login-panel">
      <div class="field">
        <label class="field-label">Identity</label>
        <input type="email" id="login-email" value="admin@ailab.io">
      </div>
      <div class="field">
        <label class="field-label">Credential</label>
        <input type="password" id="login-pass" value="••••••••••••">
      </div>
      <div class="field">
        <label class="field-label">Access role</label>
        <select id="login-role">
          <option value="admin">admin — full access</option>
          <option value="manager">manager — read + reports</option>
          <option value="researcher">researcher — ml jobs</option>
        </select>
      </div>
      <button class="btn-go" onclick="doLogin()">Connect →</button>
      <div class="login-divider"><span>Demo identities</span></div>
      <div class="demo-row" onclick="setDemo('admin@ailab.io','admin')">
        <span class="demo-role">admin@ailab.io</span>
        <span class="demo-key">ADMIN</span>
      </div>
      <div class="demo-row" onclick="setDemo('manager@ailab.io','manager')">
        <span class="demo-role">manager@ailab.io</span>
        <span class="demo-key">MANAGER</span>
      </div>
      <div class="demo-row" onclick="setDemo('researcher@ailab.io','researcher')">
        <span class="demo-role">researcher@ailab.io</span>
        <span class="demo-key">RESEARCHER</span>
      </div>
    </div>
  </div>
</div>

<!-- ============ SHELL ============ -->
<div class="shell" id="shell">
  <aside class="rail">
    <div class="rail-head">
      <div class="rail-id">AILab <span>/</span> ops</div>
      <div class="rail-name">console.ailab</div>
    </div>
    <nav class="rail-nav" id="rail-nav"></nav>
    <div class="rail-foot">
      <div class="who-row">
        <div class="who-dot"></div>
        <div class="who-info">
          <div class="who-email" id="who-email">—</div>
          <div class="who-role" id="who-role">—</div>
        </div>
        <button class="signout" onclick="doLogout()">EXIT</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="pulsebar">
      <div class="pulse-title" id="pulse-title">overview</div>
      <div class="pulse-wave"><svg id="pulse-svg" width="100%" height="24" preserveAspectRatio="none"></svg></div>
      <div class="pulse-readout">
        <span class="readout live"><b>●</b> ap-south-1</span>
        <span class="readout">cpu <b id="rb-cpu">—</b></span>
        <span class="readout">mem <b id="rb-mem">—</b></span>
        <div class="clock-readout" id="clock">--:--:--</div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const NAV = {
  admin: [
    { group: 'monitor', items: [
      { id:'overview', label:'overview', key:'1' },
      { id:'telemetry', label:'telemetry', key:'2' },
    ]},
    { group: 'infrastructure', items: [
      { id:'compute', label:'compute', key:'3' },
      { id:'database', label:'database', key:'4' },
      { id:'containers', label:'containers', key:'5' },
    ]},
    { group: 'security', items: [
      { id:'access', label:'access control', key:'6' },
      { id:'audit', label:'audit trail', key:'7' },
    ]},
    { group: 'operations', items: [
      { id:'jobs', label:'ml jobs', key:'8' },
      { id:'reports', label:'reports', key:'9' },
      { id:'cost', label:'cost', key:'0' },
    ]},
  ],
  manager: [
    { group: 'monitor', items: [
      { id:'overview', label:'overview', key:'1' },
      { id:'telemetry', label:'telemetry', key:'2' },
    ]},
    { group: 'operations', items: [
      { id:'jobs', label:'ml jobs', key:'8' },
      { id:'reports', label:'reports', key:'9' },
      { id:'cost', label:'cost', key:'0' },
    ]},
  ],
  researcher: [
    { group: 'operations', items: [
      { id:'jobs', label:'ml jobs', key:'8' },
      { id:'overview', label:'overview', key:'1' },
    ]},
    { group: 'infrastructure', items: [
      { id:'database', label:'data access', key:'4' },
    ]},
  ]
};

const TITLES = {
  overview:'overview', telemetry:'telemetry', compute:'compute / ec2',
  database:'database / rds', containers:'containers / ecs',
  access:'access control / iam', audit:'audit trail / cloudtrail',
  jobs:'ml jobs / ecs', reports:'reports', cost:'cost'
};

let user = null;
let currentPage = 'overview';
let metrics = { cpu:42, mem:67, disk:34, net:28 };

function setDemo(email, role) {
  document.getElementById('login-email').value = email;
  document.getElementById('login-role').value = role;
}

function doLogin() {
  const role = document.getElementById('login-role').value;
  const email = document.getElementById('login-email').value || role+'@ailab.io';
  user = { email, role };
  document.getElementById('login-wrap').classList.remove('show');
  document.getElementById('shell').classList.add('show');
  document.getElementById('who-email').textContent = email;
  document.getElementById('who-role').textContent = role;
  buildNav();
  navigate('overview');
  startClock();
  startMetrics();
  startPulse();
}

function doLogout() {
  user = null;
  document.getElementById('shell').classList.remove('show');
  document.getElementById('login-wrap').classList.add('show');
}

function buildNav() {
  const nav = document.getElementById('rail-nav');
  nav.innerHTML = '';
  NAV[user.role].forEach(group => {
    const label = document.createElement('div');
    label.className = 'nav-group-label';
    label.textContent = group.group;
    nav.appendChild(label);
    group.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.id = 'nav-'+item.id;
      el.innerHTML = '<span class="glyph">▸</span><span>'+item.label+'</span><span class="nkey">'+item.key+'</span>';
      el.onclick = () => navigate(item.id);
      nav.appendChild(el);
    });
  });
}

function navigate(id) {
  currentPage = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if (navEl) navEl.classList.add('active');
  document.getElementById('pulse-title').textContent = TITLES[id] || id;
  document.getElementById('content').innerHTML = PAGES[id] ? PAGES[id]() : '<p style="color:var(--ink-faint)">No access to this view.</p>';
}

function startClock() {
  const tick = () => {
    const el = document.getElementById('clock');
    if (el) el.textContent = new Date().toLocaleTimeString('en-GB');
  };
  tick(); setInterval(tick, 1000);
}

function startMetrics() {
  setInterval(() => {
    const drift = v => Math.min(95, Math.max(8, v + (Math.random()-0.48)*5));
    metrics.cpu = Math.round(drift(metrics.cpu));
    metrics.mem = Math.round(drift(metrics.mem));
    metrics.disk = Math.round(drift(metrics.disk));
    metrics.net = Math.round(drift(metrics.net));
    const set = (id,v) => { const e=document.getElementById(id); if(e) e.textContent = v+'%'; };
    const fill = (id,v) => { const e=document.getElementById(id); if(e) e.style.width = v+'%'; };
    document.getElementById('rb-cpu').textContent = metrics.cpu+'%';
    document.getElementById('rb-mem').textContent = metrics.mem+'%';
    set('ov-cpu', metrics.cpu); set('ov-mem', metrics.mem); set('ov-disk', metrics.disk); set('ov-net', metrics.net);
    fill('ov-cpu-bar', metrics.cpu); fill('ov-mem-bar', metrics.mem); fill('ov-disk-bar', metrics.disk); fill('ov-net-bar', metrics.net);
    set('tl-cpu', metrics.cpu); set('tl-mem', metrics.mem); set('tl-disk', metrics.disk); set('tl-net', metrics.net);
    fill('tl-cpu-bar', metrics.cpu); fill('tl-mem-bar', metrics.mem); fill('tl-disk-bar', metrics.disk); fill('tl-net-bar', metrics.net);
    const dashCpu = document.getElementById('big-cpu');
    if (dashCpu) dashCpu.textContent = metrics.cpu+'%';
  }, 1400);
}

/* Live pulse waveform in topbar */
let pulseData = Array.from({length:120}, () => 20 + Math.random()*8);
function startPulse() {
  const svg = document.getElementById('pulse-svg');
  function render() {
    if (!document.getElementById('pulse-svg')) return;
    const w = svg.clientWidth || 600;
    const h = 24;
    pulseData.shift();
    const spike = Math.random() > 0.93 ? Math.random()*16 : 0;
    pulseData.push(12 + Math.random()*4 + spike);
    const step = w / (pulseData.length - 1);
    let path = '';
    pulseData.forEach((v,i) => {
      const x = (i*step).toFixed(1);
      const y = (h - v).toFixed(1);
      path += (i===0 ? 'M' : 'L') + x + ',' + y + ' ';
    });
    svg.innerHTML = '<path d="'+path+'" fill="none" stroke="#FF8A3D" stroke-width="1" opacity="0.55"/>' +
      '<circle cx="'+w+'" cy="'+(h-pulseData[pulseData.length-1]).toFixed(1)+'" r="2" fill="#FF8A3D"/>';
    requestAnimationFrame(render);
  }
  render();
}

function openJobForm() {
  document.getElementById('job-form').innerHTML = `
  <div class="panel">
    <div class="panel-head"><div class="panel-title">new job <span class="dim">// ecs fargate</span></div></div>
    <div class="panel-body">
      <div class="form-row">
        <div class="field" style="margin:0"><label class="field-label">model name</label><input id="jname" placeholder="e.g. BERT Fine-tune v3"></div>
        <div class="field" style="margin:0"><label class="field-label">instance type</label>
          <select id="jtype">
            <option>c5.xlarge</option><option>c5.2xlarge</option><option>t3.large</option><option>g4dn.xlarge</option>
          </select>
        </div>
      </div>
      <button class="btn-console btn-amber" onclick="submitJob()">submit →</button>
      <button class="btn-console btn-ghost" onclick="document.getElementById('job-form').innerHTML=''">cancel</button>
    </div>
  </div>`;
}

function submitJob() {
  const name = document.getElementById('jname').value || 'Custom model';
  const type = document.getElementById('jtype').value;
  const id = 'JOB-'+(jobCounter++);
  const tbody = document.getElementById('jobs-tbody');
  const row = document.createElement('tr');
  row.innerHTML = `<td class="cell-mono cell-amber">${id}</td><td>${name}</td><td class="cell-mono">${type}</td><td class="cell-mono">${user.email}</td><td><span class="tag tag-pend">queued</span></td><td><div class="bar-track" style="width:110px;display:inline-block"><div class="bar-fill" style="width:0%"></div></div></td>`;
  tbody.insertBefore(row, tbody.firstChild);
  document.getElementById('job-form').innerHTML = '';
  document.getElementById('job-notice').innerHTML = `<div class="notice notice-ok"><div><b>${id}</b> queued on ECS Fargate. SNS will notify ${user.email} on completion.</div></div>`;
  setTimeout(() => { const n = document.getElementById('job-notice'); if(n) n.innerHTML=''; }, 5000);
}
